<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Tatva — Today's Session</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:        #14171C;
    --panel:     #1D2229;
    --panel-2:   #242A33;
    --line:      #323844;
    --text:      #F2F4F7;
    --text-dim:  #9AA3B2;
    --accent:    #FF8C5A;   /* default / rest */

    --push:      #FF8C5A;
    --pull:      #5AA9E6;
    --legs:      #6EDE8A;
    --shoulders: #C792EA;
    --rest:      #9AA3B2;

    --good:      #6EDE8A;
    --warn:      #FFD166;
    --bad:       #FF6B6B;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .display{ font-family:'Oswald', sans-serif; letter-spacing:0.02em; }

  /* ── Header ───────────────────────────────────────────── */
  header{
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
    position: sticky; top:0;
    background: rgba(20,23,28,0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .brand{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px; gap:12px;
  }
  .brand-left{
    display:flex; flex-direction:column; gap:2px;
  }
  .brand-logo{
    height: 56px; width: auto;
    max-width: 280px;
    filter: brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.15));
    object-fit: contain;
    display: block;
  }
  @media (min-width: 600px){
    .brand-logo{ height: 70px; max-width: 360px; }
  }
  .brand-tagline{
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.05em; font-style: italic;
    margin: 0; padding: 0;
  }
  @media (min-width: 600px){
    .brand-tagline{ font-size: 13px; }
  }
  .split-badge{
    font-family:'Oswald', sans-serif;
    font-size: 13px; font-weight:600;
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 6px 14px; border-radius: 999px;
    color: #14171C;
    background: var(--accent);
  }
  .date-line{
    color: var(--text-dim); font-size: 14px; margin:0;
  }

  main{ max-width: 640px; margin: 0 auto; padding: 16px 16px 200px; }

  /* ── Empty / loading states ──────────────────────────────── */
  .state-card{
    margin-top: 60px; text-align:center; color: var(--text-dim);
    padding: 40px 20px; border:1px dashed var(--line); border-radius:14px;
  }
  .state-card .big{
    font-family:'Oswald', sans-serif; font-size:20px; color:var(--text);
    margin-bottom:8px; text-transform:uppercase; letter-spacing:0.05em;
  }

  /* ── Exercise card ────────────────────────────────────────── */
  .card{
    background: var(--panel);
    border-radius: 14px;
    margin-bottom: 14px;
    padding: 16px 16px 14px;
    border-left: 5px solid var(--accent);
    position: relative;
    transition: opacity 0.2s;
  }
  .card.skipped{ opacity: 0.45; }

  .card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .ex-name{
    font-family:'Oswald', sans-serif; font-size:18px; font-weight:600;
    margin:0 0 4px; line-height:1.25;
  }
  .ex-index{ color: var(--text-dim); font-weight:500; margin-right:6px; }

  .badges{ display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
  .badge{
    font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em;
    padding: 3px 8px; border-radius:6px;
  }
  .badge.superset{ background: rgba(90,169,230,0.18); color:var(--pull); }
  .badge.dropset{ background: rgba(255,107,107,0.18); color:var(--bad); }

  .muscle{
    color: var(--text-dim); font-size: 13px; margin: 6px 0 2px;
  }
  .planned{
    font-size: 13px; color: var(--text-dim); margin: 2px 0 0;
  }
  .planned b{ color: var(--text); font-weight:600; }

  .meta-line{
    font-size: 12.5px; color: var(--text-dim); margin-top: 6px;
    padding-top: 6px; border-top: 1px dashed var(--line);
  }
  .meta-line.alt{ color: var(--shoulders); }
  .meta-line.note{ color: var(--warn); }

  /* ── Inputs row ───────────────────────────────────────────── */
  .inputs{
    display:grid; grid-template-columns: 1fr 1fr 1fr auto;
    gap:8px; margin-top:12px; align-items:end;
  }
  .field label{
    display:block; font-size:11px; color: var(--text-dim);
    text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;
  }
  .field input{
    width:100%; background: var(--panel-2); border:1px solid var(--line);
    color: var(--text); border-radius:8px; padding:10px 8px;
    font-family:'Oswald', sans-serif; font-size:16px; font-weight:600;
    text-align:center;
  }
  .field input:focus-visible{
    outline: 2px solid var(--accent); outline-offset: 1px;
  }
  .field input:disabled{ opacity:0.4; }

  /* ── Mic button ───────────────────────────────────────────── */
  .mic-btn{
    width:44px; height:44px; border-radius:50%;
    border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition: all 0.15s; flex-shrink:0;
  }
  .mic-btn:active{ transform: scale(0.94); }
  .mic-btn.listening{
    background: var(--accent); color:#14171C; border-color: var(--accent);
    animation: pulse 1.1s ease-out infinite;
  }
  @keyframes pulse{
    0%   { box-shadow: 0 0 0 0 rgba(255,140,90,0.55); }
    70%  { box-shadow: 0 0 0 12px rgba(255,140,90,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,140,90,0); }
  }
  @media (prefers-reduced-motion: reduce){
    .mic-btn.listening{ animation:none; }
  }

  .heard-toast{
    font-size:12px; color: var(--good); margin-top:8px;
    min-height: 14px;
  }

  /* ── Skip row ─────────────────────────────────────────────── */
  .skip-row{
    display:flex; align-items:center; gap:8px; margin-top:10px;
    font-size:13px; color: var(--text-dim); cursor:pointer; user-select:none;
  }
  .skip-row input{ width:16px; height:16px; accent-color: var(--bad); }

  /* ── Cardio card ──────────────────────────────────────────── */
  .cardio-card{
    background: var(--panel); border-radius:14px; padding:16px;
    border-left: 5px solid var(--good); margin-bottom: 14px;
  }
  .cardio-card h3{
    font-family:'Oswald', sans-serif; font-size:16px; margin:0 0 4px;
    text-transform:uppercase;
  }
  .cardio-card p{ font-size:13px; color:var(--text-dim); margin:2px 0; }

  /* ── Footer save bar ─────────────────────────────────── */
  .save-bar{
    position: fixed; bottom: 62px; left:0; right:0;
    background: rgba(20,23,28,0.96); backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    padding: 12px 16px; display:flex; flex-direction:column; gap:6px;
    align-items:center; z-index: 19;
  }
  .save-btn{
    width:100%; max-width: 600px;
    font-family:'Oswald', sans-serif; font-size:17px; font-weight:600;
    text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--accent); color: #14171C;
    border:none; border-radius: 10px; padding: 16px;
    cursor:pointer; transition: opacity 0.15s;
  }
  .save-btn:active{ opacity:0.8; }
  .save-btn:disabled{ opacity:0.5; }
  .status-msg{ font-size:13px; color: var(--text-dim); min-height: 16px; }
  .status-msg.success{ color: var(--good); }
  .status-msg.error{ color: var(--bad); }

  /* ── Bottom nav ───────────────────────────────────────── */
  .bottom-nav{
    position: fixed; bottom:0; left:0; right:0;
    background: rgba(20,23,28,0.97); backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    display:flex; z-index: 20; height: 62px;
  }
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:8px; gap:3px;
    text-decoration:none; color:var(--text-dim);
    font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.06em; transition:color 0.15s;
  }
  .nav-item.active{ color:var(--accent); }
  .nav-item .nav-icon{ font-size:20px; line-height:1; }

  .prev-banner{
    background: rgba(110,222,138,0.10); border:1px solid rgba(110,222,138,0.25);
    color: var(--good); font-size:13px; padding:10px 14px; border-radius:10px;
    margin-bottom:14px;
  }

  /* ── Skip day UI ──────────────────────────────────────── */
  .skip-day-btn{
    font-size:12px; font-weight:600; font-family:'Inter',sans-serif;
    color:var(--text-dim); background:none;
    border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; cursor:pointer; white-space:nowrap;
    transition:all 0.15s; flex-shrink:0;
  }
  .skip-day-btn:hover{ border-color:var(--bad); color:var(--bad); }
  .skip-day-btn.active{ border-color:var(--bad); color:var(--bad); background:rgba(255,107,107,0.08); }

  .skip-panel{
    display:none; margin-top:10px;
    background:rgba(255,107,107,0.06); border:1px solid rgba(255,107,107,0.2);
    border-radius:10px; padding:12px 14px;
  }
  .skip-panel.open{ display:block; }
  .skip-panel-label{ font-size:12px; color:var(--text-dim); margin-bottom:8px; }
  .skip-reasons{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
  .reason-pill{
    font-size:12px; font-weight:600; padding:5px 12px; border-radius:999px;
    border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim);
    cursor:pointer; transition:all 0.15s;
  }
  .reason-pill.selected{ background:rgba(255,107,107,0.18); border-color:var(--bad); color:var(--bad); }
  .skip-confirm-btn{
    width:100%; font-family:'Oswald',sans-serif; font-size:15px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.06em;
    background:var(--bad); color:white; border:none; border-radius:8px;
    padding:11px; cursor:pointer; transition:opacity 0.15s;
  }
  .skip-confirm-btn:active{ opacity:0.8; }

  .skipped-day-banner{
    background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.25);
    border-radius:12px; padding:20px; text-align:center; margin:16px 0;
  }
  .skipped-day-banner .icon{ font-size:32px; margin-bottom:8px; }
  .skipped-day-banner .title{ font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; color:var(--bad); margin-bottom:4px; }
  .skipped-day-banner .sub{ font-size:13px; color:var(--text-dim); margin-bottom:14px; }
  .undo-skip-btn{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    background:none; border:1px solid var(--line); color:var(--text-dim);
    border-radius:8px; padding:9px 16px; cursor:pointer; transition:all 0.15s;
  }
  .undo-skip-btn:hover{ border-color:var(--text); color:var(--text); }
  .undo-skip-btn:active{ opacity:0.7; }

  /* ── Date range picker (Travel / Injury) ─────────────────── */
  .date-range-wrap{ display:none; margin-bottom:10px; }
  .date-range-wrap.open{ display:block; }
  .date-range-row{ display:flex; gap:8px; margin-bottom:6px; }
  .date-field{ flex:1; }
  .date-field label{
    display:block; font-size:11px; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px;
  }
  .date-field input{
    width:100%; background:var(--panel-2); border:1px solid var(--line);
    color:var(--text); border-radius:8px; padding:9px 8px; font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .date-range-hint{ font-size:11px; color:var(--text-dim); margin-bottom:10px; }

  /* ── Alternative toggle ───────────────────────────────────── */
  .alt-toggle-row{
    display:flex; align-items:center; gap:10px; margin-top:10px;
    padding: 8px 10px; border-radius:8px;
    background: rgba(199,146,234,0.08); border:1px solid rgba(199,146,234,0.2);
  }
  .alt-toggle-label{
    font-size:12px; color: var(--text-dim);
    text-transform:uppercase; letter-spacing:0.07em; white-space:nowrap;
  }
  .alt-toggle-label.active{ color: var(--shoulders); font-weight:600; }
  .toggle-switch{
    position:relative; width:40px; height:22px; flex-shrink:0;
  }
  .toggle-switch input{ opacity:0; width:0; height:0; }
  .toggle-track{
    position:absolute; inset:0; border-radius:11px;
    background: var(--line); cursor:pointer; transition: background 0.2s;
  }
  .toggle-track::before{
    content:''; position:absolute;
    width:16px; height:16px; border-radius:50%;
    left:3px; top:3px;
    background: var(--text-dim); transition: transform 0.2s, background 0.2s;
  }
  .toggle-switch input:checked + .toggle-track{ background: var(--shoulders); }
  .toggle-switch input:checked + .toggle-track::before{
    transform: translateX(18px); background: white;
  }
  .alt-name-label{
    font-size:13px; color: var(--text-dim); flex:1; line-height:1.3;
  }
  .alt-name-label.active{ color: var(--shoulders); font-weight:500; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-left">
      <img src="tatva-logo.png" alt="Tatva" class="brand-logo" />
      <p class="brand-tagline">The Essence of Becoming Better.</p>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <span class="split-badge" id="splitBadge">—</span>
      <button class="skip-day-btn" id="skipDayBtn" onclick="toggleSkipPanel()" style="display:none">✕ Skip</button>
    </div>
  </div>
  <p class="date-line" id="dateLine">Loading today's session…</p>

  <!-- Skip panel — expands below header -->
  <div class="skip-panel" id="skipPanel">
    <div class="skip-panel-label">Why are you skipping? <span style="color:var(--text-dim);font-size:11px">(optional)</span></div>
    <div class="skip-reasons">
      <button class="reason-pill" data-reason="Rest" onclick="selectReason(this)">😴 Rest</button>
      <button class="reason-pill" data-reason="Sick" onclick="selectReason(this)">🤒 Sick</button>
      <button class="reason-pill" data-reason="Injury" onclick="selectReason(this)">🤕 Injury</button>
      <button class="reason-pill" data-reason="Travel" onclick="selectReason(this)">✈️ Travel</button>
    </div>
    <div class="date-range-wrap" id="dateRangeWrap">
      <div class="date-range-row">
        <div class="date-field">
          <label>From</label>
          <input type="date" id="skipFromDate" />
        </div>
        <div class="date-field">
          <label>To</label>
          <input type="date" id="skipToDate" />
        </div>
      </div>
      <div class="date-range-hint">All days in this range will be marked skipped — no need to come back daily.</div>
    </div>
    <button class="skip-confirm-btn" onclick="confirmSkip()">Confirm — Log as Skipped</button>
  </div>
</header>

<main id="main">
  <div class="state-card" id="loadingState">
    <div class="big">Loading</div>
    <div>Fetching today's plan from Supabase…</div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">🏋️</span>Today
  </a>
  <a href="dashboard.html" class="nav-item">
    <span class="nav-icon">📊</span>Dashboard
  </a>
</nav>

<div class="save-bar" id="saveBar" style="display:none;">
  <div class="status-msg" id="statusMsg"></div>
  <button class="save-btn" id="saveBtn">💾 Save Session</button>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  // CONFIG — fill these in before deploying
  // ─────────────────────────────────────────────────────────────
  const SUPABASE_URL  = "https://gffjcpmxjlkxwztbtvof.supabase.co";       // e.g. https://xxxxx.supabase.co
  const SUPABASE_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZmpjcG14amxreHd6dGJ0dm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjAyMTAsImV4cCI6MjA5NjgzNjIxMH0.P3YEfOzyz5Ojh5utC71F2CIeaUif6SeAueYRN47Ivq8";  // anon / public key
  const USER_ID       = "c5cd2b52-0ad3-42b0-a675-c5be808e65bd";   // UUID from users table

  const SPLIT_COLORS = {
    Push: "var(--push)", Pull: "var(--pull)", Legs: "var(--legs)",
    Shoulders: "var(--shoulders)", Rest: "var(--rest)"
  };

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─────────────────────────────────────────────────────────────
  // Date helper — today's date in IST, regardless of browser TZ
  // ─────────────────────────────────────────────────────────────
  function getISTDateString(){
    const now = new Date();
    const istMs = now.getTime() + (5.5 * 60 + now.getTimezoneOffset()) * 60000;
    return new Date(istMs).toISOString().slice(0, 10);
  }
  function formatDateNice(dateStr){
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'short', year:'numeric' });
  }

  // ─────────────────────────────────────────────────────────────
  // Skip day logic
  // ─────────────────────────────────────────────────────────────
  let selectedSkipReason = null;
  const RANGE_REASONS = ['Travel', 'Injury']; // these reasons show the date picker

  function toggleSkipPanel(){
    const panel = document.getElementById('skipPanel');
    const btn   = document.getElementById('skipDayBtn');
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open', !isOpen);
    btn.classList.toggle('active', !isOpen);
    if(isOpen){
      // Closing — reset everything
      resetSkipPanel();
    } else {
      // Opening — pre-fill From date with today
      document.getElementById('skipFromDate').value = getISTDateString();
      document.getElementById('skipToDate').value = getISTDateString();
    }
  }

  function resetSkipPanel(){
    selectedSkipReason = null;
    document.querySelectorAll('.reason-pill').forEach(p=>p.classList.remove('selected'));
    document.getElementById('dateRangeWrap').classList.remove('open');
  }

  function selectReason(el){
    document.querySelectorAll('.reason-pill').forEach(p=>p.classList.remove('selected'));
    const wrap = document.getElementById('dateRangeWrap');

    if(selectedSkipReason === el.dataset.reason){
      // Tap same pill again = deselect
      selectedSkipReason = null;
      wrap.classList.remove('open');
    } else {
      el.classList.add('selected');
      selectedSkipReason = el.dataset.reason;
      const showRange = RANGE_REASONS.includes(selectedSkipReason);
      wrap.classList.toggle('open', showRange);
      if(showRange){
        // Default end date to same as start if not already changed
        const fromVal = document.getElementById('skipFromDate').value || getISTDateString();
        document.getElementById('skipFromDate').value = fromVal;
        document.getElementById('skipFromDate').min = getISTDateString();
        document.getElementById('skipToDate').min = fromVal;
      }
    }
  }

  async function confirmSkip(){
    const today = getISTDateString();
    const isRange = selectedSkipReason && RANGE_REASONS.includes(selectedSkipReason);

    let startDate = today;
    let endDate = today;

    if(isRange){
      startDate = document.getElementById('skipFromDate').value || today;
      endDate = document.getElementById('skipToDate').value || startDate;
      if(endDate < startDate){
        alert('"To" date must be on or after "From" date.');
        return;
      }
    }

    // Check if any exercises already logged today
    const { data: existing } = await sb
      .from('actual_workouts')
      .select('id')
      .eq('user_id', USER_ID)
      .eq('date', today)
      .neq('exercise_name', '__day_skipped__')
      .limit(1);

    if(existing && existing.length > 0){
      const confirmed = window.confirm(
        "You've already logged some exercises today.\n\nConfirming skip will clear all logged exercises for today and mark it as skipped.\n\nAre you sure?"
      );
      if(!confirmed) return;
    }

    // Delete any existing actuals for today (and any prior skip rows covering today)
    await sb.from('actual_workouts').delete().eq('user_id', USER_ID).eq('date', today);

    // Insert skip record — one row represents the whole range
    const { error } = await sb.from('actual_workouts').insert({
      user_id: USER_ID,
      session_id: SESSION?.id || null,
      date: startDate,
      skip_end_date: isRange ? endDate : null,
      exercise_name: '__day_skipped__',
      planned_sets: null,
      planned_reps: null,
      planned_weight_kg: null,
      actual_sets: null,
      actual_reps: null,
      actual_weight_kg: null,
      skipped: true,
      notes: selectedSkipReason || null
    });

    if(error){
      alert('Error saving: ' + error.message);
      return;
    }

    // Hide skip panel and save bar
    document.getElementById('skipPanel').classList.remove('open');
    document.getElementById('skipDayBtn').classList.remove('active');
    document.getElementById('saveBar').style.display = 'none';

    showSkippedBanner(startDate, isRange ? endDate : null, selectedSkipReason);
    resetSkipPanel();
  }

  function showSkippedBanner(startDate, endDate, reason){
    const reasonText = reason ? ` — ${reason}` : '';
    const today = getISTDateString();

    let rangeText = '';
    let undoHtml = `<button class="undo-skip-btn" onclick="undoSkip()">↩️ Undo Skip</button>`;

    if(endDate && endDate !== startDate){
      // Multi-day range — show progress
      const totalDays = dateDiffDays(startDate, endDate) + 1;
      const dayNum = Math.min(dateDiffDays(startDate, today) + 1, totalDays);
      rangeText = `<div class="sub">Skipping ${fmtDateShort(startDate)} – ${fmtDateShort(endDate)} (Day ${Math.max(dayNum,1)} of ${totalDays})</div>`;
    } else {
      rangeText = `<div class="sub">Rest well. Come back stronger tomorrow.</div>`;
    }

    document.getElementById('main').innerHTML = `
      <div class="skipped-day-banner">
        <div class="icon">🛌</div>
        <div class="title">Day${endDate&&endDate!==startDate?'s':''} Logged as Skipped${reasonText}</div>
        ${rangeText}
        ${undoHtml}
      </div>`;
  }

  async function undoSkip(){
    const confirmed = window.confirm("This will cancel your skip and let you log today's workout normally. Continue?");
    if(!confirmed) return;

    const today = getISTDateString();
    // Delete any skip row covering today
    const { data: skipRows } = await sb
      .from('actual_workouts')
      .select('*')
      .eq('user_id', USER_ID)
      .eq('exercise_name', '__day_skipped__');

    const covering = (skipRows||[]).filter(r => {
      const start = r.date;
      const end = r.skip_end_date || r.date;
      return today >= start && today <= end;
    });

    for(const row of covering){
      await sb.from('actual_workouts').delete().eq('id', row.id);
    }

    // Reload the page state
    document.getElementById('skipDayBtn').style.display = 'none';
    PREV_ACTUALS = {};
    init();
  }

  function dateDiffDays(a, b){
    const d1 = new Date(a+'T00:00:00');
    const d2 = new Date(b+'T00:00:00');
    return Math.round((d2-d1)/(1000*60*60*24));
  }

  function fmtDateShort(dateStr){
    return new Date(dateStr+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  }

  // ─────────────────────────────────────────────────────────────
  // Voice parsing — extract sets / reps / weight / skip from speech
  // ─────────────────────────────────────────────────────────────
  function parseVoice(transcript){
    const t = transcript.toLowerCase();
    const out = {};

    if (/\bskip|skipped|didn'?t do|missed\b/.test(t)) out.skipped = true;

    let m;
    if ((m = t.match(/(\d+)\s*sets?/)))                       out.sets   = parseInt(m[1]);
    if ((m = t.match(/(\d+(?:\.\d+)?)\s*reps?/)))             out.reps   = m[1];
    if ((m = t.match(/(\d+(?:\.\d+)?)\s*(?:kg|kilos?|kilograms?)/))) out.weight = parseFloat(m[1]);

    // Fallback: no keywords found — assign bare numbers positionally
    if (out.sets === undefined && out.reps === undefined && out.weight === undefined){
      const nums = t.match(/\d+(?:\.\d+)?/g);
      if (nums){
        if (nums.length >= 3){ out.sets = parseInt(nums[0]); out.reps = nums[1]; out.weight = parseFloat(nums[2]); }
        else if (nums.length === 2){ out.reps = nums[0]; out.weight = parseFloat(nums[1]); }
        else if (nums.length === 1){ out.weight = parseFloat(nums[0]); }
      }
    }
    return out;
  }

  // ─────────────────────────────────────────────────────────────
  // Main load
  // ─────────────────────────────────────────────────────────────
  let SESSION = null;
  let EXERCISES = [];
  let PREV_ACTUALS = {};

  async function init(){
    const today = getISTDateString();
    document.getElementById('dateLine').textContent = formatDateNice(today);

    const { data: sessionRows, error: sessErr } = await sb
      .from('sessions')
      .select('id, date, split, full_plan_json')
      .eq('user_id', USER_ID)
      .eq('date', today)
      .limit(1);

    if (sessErr){
      renderState("Connection error", sessErr.message);
      return;
    }

    if (!sessionRows || sessionRows.length === 0){
      renderState("No session yet", "Either it's a Rest day, or the agent hasn't run yet today (check back after ~1 PM IST).");
      return;
    }

    SESSION = sessionRows[0];
    EXERCISES = (SESSION.full_plan_json && SESSION.full_plan_json.exercises) || [];
    const cardio = (SESSION.full_plan_json && SESSION.full_plan_json.cardio) || null;

    // Style the badge
    const badge = document.getElementById('splitBadge');
    badge.textContent = SESSION.split;
    document.documentElement.style.setProperty('--accent', SPLIT_COLORS[SESSION.split] || 'var(--push)');

    // Check for previously logged actuals today
    const { data: prevRows } = await sb
      .from('actual_workouts')
      .select('*')
      .eq('user_id', USER_ID)
      .eq('date', today);

    let hadPrev = false;
    if (prevRows){
      prevRows.forEach(r => { PREV_ACTUALS[r.exercise_name] = r; hadPrev = true; });
    }

    // Check if today falls within any skip range
    const { data: allSkipRows } = await sb
      .from('actual_workouts')
      .select('*')
      .eq('user_id', USER_ID)
      .eq('exercise_name', '__day_skipped__');

    const activeSkip = (allSkipRows||[]).find(r => {
      const start = r.date;
      const end = r.skip_end_date || r.date;
      return today >= start && today <= end;
    });

    if(activeSkip){
      showSkippedBanner(activeSkip.date, activeSkip.skip_end_date, activeSkip.notes);
      // Show skip button so user can still see it (panel itself stays closed)
      document.getElementById('skipDayBtn').style.display = 'block';
      return;
    }

    // Show skip button now that we have a session
    document.getElementById('skipDayBtn').style.display = 'block';

    renderExercises(EXERCISES, cardio, hadPrev);
    document.getElementById('saveBar').style.display = 'flex';
  }

  function renderState(title, body){
    document.getElementById('main').innerHTML = `
      <div class="state-card">
        <div class="big">${title}</div>
        <div>${body}</div>
      </div>`;
  }

  function renderExercises(exercises, cardio, hadPrev){
    const main = document.getElementById('main');
    let html = '';

    if (hadPrev){
      html += `<div class="prev-banner">✅ You already logged this session today. Saving again will overwrite your previous entries.</div>`;
    }

    exercises.forEach((ex, i) => {
      // Parse clean alternative name — strip "Alt: " prefix
      const altRaw = ex.alternative || '';
      const altName = altRaw.replace(/^Alt:\s*/i, '').trim();
      const hasAlt = altName.length > 0;

      // Check if a previous save used the alternative for this slot
      const prevMain = PREV_ACTUALS[ex.name];
      const prevAlt  = hasAlt ? PREV_ACTUALS[altName] : null;
      const usedAlt  = !prevMain && !!prevAlt;
      const prev     = usedAlt ? prevAlt : prevMain;

      const defSets   = prev ? prev.actual_sets   : ex.sets;
      const defReps   = prev ? prev.actual_reps   : (String(ex.reps).match(/\d+(?:\.\d+)?/) || [ex.reps])[0];
      const defWeight = prev ? prev.actual_weight_kg : ex.weight_kg;
      const isSkipped = prev ? prev.skipped : false;

      let badges = '';
      if (ex.type === 'superset') badges += `<span class="badge superset">⚡ Superset</span>`;
      if (ex.type === 'dropset')  badges += `<span class="badge dropset">🔽 Dropset</span>`;

      // Toggle switch HTML — only rendered when alternative exists
      const toggleHtml = hasAlt ? `
        <div class="alt-toggle-row">
          <span class="alt-toggle-label ${usedAlt ? '' : 'active'}" data-role="main-lbl">Main</span>
          <label class="toggle-switch">
            <input type="checkbox" class="inp-alt-toggle" ${usedAlt ? 'checked' : ''}/>
            <span class="toggle-track"></span>
          </label>
          <span class="alt-name-label ${usedAlt ? 'active' : ''}" data-role="alt-lbl">${escapeHtml(altName)}</span>
        </div>` : '';

      html += `
      <div class="card ${isSkipped ? 'skipped' : ''}" data-index="${i}" data-main-name="${escapeHtml(ex.name)}" data-alt-name="${escapeHtml(altName)}">
        <div class="card-top">
          <div>
            <p class="ex-name"><span class="ex-index">${i+1}.</span><span class="inp-ex-display">${escapeHtml(usedAlt ? altName : ex.name)}</span></p>
            <div class="badges">${badges}</div>
          </div>
        </div>
        <p class="muscle">🎯 ${escapeHtml(ex.muscle || '')}</p>
        <p class="planned">Planned: <b>${ex.sets} × ${ex.reps}</b> @ <b>${ex.weight_kg}kg</b>${ex.partner ? ` &nbsp;↪ with ${escapeHtml(ex.partner)}` : ''}</p>
        ${toggleHtml}
        ${ex.note ? `<p class="meta-line note">💡 ${escapeHtml(ex.note)}</p>` : ''}

        <div class="inputs">
          <div class="field">
            <label>Sets</label>
            <input type="number" inputmode="numeric" class="inp-sets" value="${defSets ?? ''}" ${isSkipped ? 'disabled' : ''}/>
          </div>
          <div class="field">
            <label>Reps</label>
            <input type="text" inputmode="decimal" class="inp-reps" value="${defReps ?? ''}" ${isSkipped ? 'disabled' : ''}/>
          </div>
          <div class="field">
            <label>Weight (kg)</label>
            <input type="number" step="0.5" inputmode="decimal" class="inp-weight" value="${defWeight ?? ''}" ${isSkipped ? 'disabled' : ''}/>
          </div>
          <button class="mic-btn" type="button" aria-label="Log by voice">🎤</button>
        </div>
        <div class="heard-toast"></div>

        <label class="skip-row">
          <input type="checkbox" class="inp-skip" ${isSkipped ? 'checked' : ''}/>
          Skipped this exercise
        </label>
      </div>`;
    });

    if (cardio){
      const prevCardio = PREV_ACTUALS['__cardio__'];
      const cardioDone = prevCardio ? prevCardio.actual_sets === 1 : false;
      html += `
      <div class="cardio-card" data-index="cardio">
        <h3>🏃 Cardio Finisher</h3>
        <p><b>${escapeHtml(cardio.exercise || '')}</b> — ${escapeHtml(cardio.duration || '')}</p>
        <p>❤️ ${escapeHtml(cardio.hr_target || '')}</p>
        ${cardio.note ? `<p>💡 ${escapeHtml(cardio.note)}</p>` : ''}
        <label class="skip-row" style="margin-top:10px;">
          <input type="checkbox" class="inp-cardio-done" ${cardioDone ? 'checked' : ''}/>
          Completed cardio
        </label>
      </div>`;
    }

    main.innerHTML = html;
    attachMicHandlers();
    attachSkipHandlers();
    attachToggleHandlers();
  }

  // ─────────────────────────────────────────────────────────────
  // Alternative toggle — swap exercise name + clear/restore fields
  // ─────────────────────────────────────────────────────────────
  function attachToggleHandlers(){
    document.querySelectorAll('.inp-alt-toggle').forEach(toggle => {
      toggle.addEventListener('change', () => {
        const card       = toggle.closest('.card');
        const mainName   = card.dataset.mainName;
        const altName    = card.dataset.altName;
        const display    = card.querySelector('.inp-ex-display');
        const mainLbl    = card.querySelector('[data-role="main-lbl"]');
        const altLbl     = card.querySelector('[data-role="alt-lbl"]');
        const setsInp    = card.querySelector('.inp-sets');
        const repsInp    = card.querySelector('.inp-reps');
        const weightInp  = card.querySelector('.inp-weight');
        const usingAlt   = toggle.checked;

        // Update displayed exercise name
        display.textContent = usingAlt ? altName : mainName;

        // Update toggle label styles
        mainLbl.classList.toggle('active', !usingAlt);
        altLbl.classList.toggle('active', usingAlt);

        // Clear fields when switching — user fills in manually
        setsInp.value   = '';
        repsInp.value   = '';
        weightInp.value = '';
      });
    });
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ─────────────────────────────────────────────────────────────
  // Skip checkbox — disable/grey inputs
  // ─────────────────────────────────────────────────────────────
  function attachSkipHandlers(){
    document.querySelectorAll('.inp-skip').forEach(cb => {
      cb.addEventListener('change', () => {
        const card = cb.closest('.card');
        card.classList.toggle('skipped', cb.checked);
        card.querySelectorAll('.inputs input[type], .field input').forEach(inp => {
          inp.disabled = cb.checked;
        });
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  // Voice input — Web Speech API
  // ─────────────────────────────────────────────────────────────
  function attachMicHandlers(){
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    document.querySelectorAll('.mic-btn').forEach(btn => {
      if (!SpeechRecognition){
        btn.style.opacity = '0.3';
        btn.title = 'Voice input not supported in this browser';
        return;
      }

      btn.addEventListener('click', () => {
        const card = btn.closest('.card');
        const toast = card.querySelector('.heard-toast');
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-IN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        btn.classList.add('listening');
        toast.textContent = 'Listening…';

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          const parsed = parseVoice(transcript);

          if (parsed.sets   !== undefined) card.querySelector('.inp-sets').value = parsed.sets;
          if (parsed.reps   !== undefined) card.querySelector('.inp-reps').value = parsed.reps;
          if (parsed.weight !== undefined) card.querySelector('.inp-weight').value = parsed.weight;
          if (parsed.skipped){
            const skipBox = card.querySelector('.inp-skip');
            skipBox.checked = true;
            skipBox.dispatchEvent(new Event('change'));
          }

          const heard = [];
          if (parsed.sets !== undefined) heard.push(`${parsed.sets} sets`);
          if (parsed.reps !== undefined) heard.push(`${parsed.reps} reps`);
          if (parsed.weight !== undefined) heard.push(`${parsed.weight}kg`);
          toast.textContent = heard.length ? `Heard: ${heard.join(', ')}` : `Heard: "${transcript}" — couldn't extract numbers, edit manually.`;
        };

        recognition.onerror = (event) => {
          toast.textContent = `Mic error: ${event.error}`;
        };

        recognition.onend = () => {
          btn.classList.remove('listening');
        };

        recognition.start();
      });
    });
  }

  // ─────────────────────────────────────────────────────────────
  // Save
  // ─────────────────────────────────────────────────────────────
  document.getElementById('saveBtn').addEventListener('click', async () => {
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('statusMsg');
    btn.disabled = true;
    status.className = 'status-msg';
    status.textContent = 'Saving…';

    const today = getISTDateString();
    const rows = [];

    document.querySelectorAll('.card[data-index]').forEach(card => {
      const i = parseInt(card.dataset.index);
      const ex = EXERCISES[i];
      const skipped = card.querySelector('.inp-skip').checked;

      // Determine which exercise name to save — main or alternative
      const altToggle = card.querySelector('.inp-alt-toggle');
      const usingAlt  = altToggle && altToggle.checked;
      const savedName = usingAlt ? card.dataset.altName : ex.name;

      rows.push({
        user_id: USER_ID,
        session_id: SESSION.id,
        date: today,
        exercise_name: savedName,
        planned_sets: ex.sets,
        planned_reps: String(ex.reps),
        planned_weight_kg: ex.weight_kg,
        actual_sets: skipped ? null : parseInt(card.querySelector('.inp-sets').value) || null,
        actual_reps: skipped ? null : card.querySelector('.inp-reps').value || null,
        actual_weight_kg: skipped ? null : parseFloat(card.querySelector('.inp-weight').value) || null,
        skipped: skipped,
        notes: usingAlt ? `Used alternative: ${savedName}` : null
      });
    });

    // Cardio row
    const cardioCard = document.querySelector('.cardio-card');
    if (cardioCard){
      const done = cardioCard.querySelector('.inp-cardio-done').checked;
      rows.push({
        user_id: USER_ID,
        session_id: SESSION.id,
        date: today,
        exercise_name: '__cardio__',
        planned_sets: null, planned_reps: null, planned_weight_kg: null,
        actual_sets: done ? 1 : 0,
        actual_reps: null, actual_weight_kg: null,
        skipped: false,
        notes: done ? 'Cardio completed' : 'Cardio not done'
      });
    }

    // Replace any existing rows for today (delete then insert)
    const { error: delErr } = await sb
      .from('actual_workouts')
      .delete()
      .eq('user_id', USER_ID)
      .eq('date', today);

    if (delErr){
      status.className = 'status-msg error';
      status.textContent = `Error clearing old entries: ${delErr.message}`;
      btn.disabled = false;
      return;
    }

    const { error: insErr } = await sb.from('actual_workouts').insert(rows);

    if (insErr){
      status.className = 'status-msg error';
      status.textContent = `Error saving: ${insErr.message}`;
    } else {
      status.className = 'status-msg success';
      status.textContent = `✅ Saved at ${new Date().toLocaleTimeString('en-IN')}`;
    }
    btn.disabled = false;
  });

  init();
</script>

</body>
</html>
