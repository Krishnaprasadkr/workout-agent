<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>Tatva — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#14171C;--panel:#1D2229;--panel-2:#242A33;--line:#323844;
  --text:#F2F4F7;--text-dim:#9AA3B2;
  --push:#FF8C5A;--pull:#5AA9E6;--legs:#6EDE8A;--shoulders:#C792EA;--rest:#4A5568;
  --good:#6EDE8A;--warn:#FFD166;--bad:#FF6B6B;--gold:#FFD700;--accent:#FF8C5A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}

/* Header */
header{padding:18px 20px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(20,23,28,0.94);backdrop-filter:blur(8px);z-index:10;}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand-left{display:flex;flex-direction:column;gap:4px;}
.brand-logo{height:52px;width:auto;max-width:260px;filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.15));object-fit:contain;display:block;}
@media(min-width:600px){.brand-logo{height:66px;max-width:340px;}}
.brand-tagline{font-size:11px;color:var(--text-dim);letter-spacing:0.05em;font-style:italic;margin:0;}
.header-label{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);padding:5px 12px;border:1px solid var(--line);border-radius:999px;white-space:nowrap;}

main{max-width:680px;margin:0 auto;padding:14px 14px 130px;}

/* Hero */
.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.hero-card{background:var(--panel);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--line);}
.hero-card.streak-on{border-color:var(--push);background:rgba(255,140,90,0.08);}
.hero-card.pr-on{border-color:var(--gold);background:rgba(255,215,0,0.06);}
.hero-icon{font-size:20px;margin-bottom:4px;}
.hero-num{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:4px;}
.hero-num.c-push{color:var(--push);}
.hero-num.c-gold{color:var(--gold);}
.hero-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.07em;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--panel);padding:5px;border-radius:12px;}
.tab{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all 0.15s;border:none;background:none;}
.tab.active{background:var(--accent);color:#14171C;}

/* Section title */
.stitle{font-family:'Oswald',sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin:18px 0 8px;}

/* Cards */
.card{background:var(--panel);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--line);}
.card-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.clabel{font-size:13px;color:var(--text-dim);}
.cval{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;}

/* Week heatmap */
.week-heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px;}
.day-cell{border-radius:10px;padding:10px 4px;text-align:center;background:var(--panel-2);border:1px solid transparent;position:relative;}
.day-cell.today-cell{outline:2px solid var(--accent);outline-offset:1px;}
.day-cell.trained{background:var(--split-bg,var(--panel-2));border-color:var(--split-border,transparent);}
.day-cell.missed{background:rgba(255,107,107,0.06);border-color:rgba(255,107,107,0.2);}
.day-name{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.day-name.today-name{color:var(--accent);font-weight:700;}
.day-split-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.day-vol{font-size:9px;color:var(--text-dim);margin-top:3px;}
.dot{width:8px;height:8px;border-radius:50%;margin:4px auto 0;background:var(--split-color,var(--panel-2));}

/* Completion */
.bar-bg{background:var(--panel-2);border-radius:999px;height:7px;overflow:hidden;margin:6px 0;}
.bar-fill{height:100%;border-radius:999px;transition:width 0.6s ease;}

/* Charts */
.chart-wrap{position:relative;height:200px;margin:6px 0;}
.chart-tall{position:relative;height:260px;margin:6px 0;}

/* Dropdown */
.week-select,.ex-select{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:12px;font-family:'Inter',sans-serif;}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{background:var(--panel);border-radius:12px;padding:14px;border:1px solid var(--line);}
.stat-card .val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:700;margin-bottom:2px;}
.stat-card .lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;}

/* Insight */
.insight-card{background:rgba(255,140,90,0.07);border:1px solid rgba(255,140,90,0.22);border-radius:12px;padding:14px;margin-bottom:10px;}
.insight-card p{margin:0;font-size:14px;line-height:1.55;}

/* Year heatmap */
.year-wrap{overflow-x:auto;padding-bottom:6px;}
.year-legend{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap;}
.legend-cell{width:11px;height:11px;border-radius:2px;}

/* Empty */
.empty{text-align:center;color:var(--text-dim);padding:40px 20px;}
.empty .big{font-family:'Oswald',sans-serif;font-size:18px;color:var(--text);margin-bottom:8px;text-transform:uppercase;}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,23,28,0.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:20;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;gap:3px;text-decoration:none;color:var(--text-dim);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;transition:color 0.15s;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:20px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-left">
      <img src="tatva-logo.png" alt="Tatva" class="brand-logo"/>
      <p class="brand-tagline">The Essence of Becoming Better.</p>
    </div>
    <span class="header-label">Dashboard</span>
  </div>
</header>

<main>
  <div class="hero">
    <div class="hero-card" id="heroStreak">
      <div class="hero-icon">🔥</div>
      <div class="hero-num" id="streakNum">—</div>
      <div class="hero-label">Day Streak</div>
    </div>
    <div class="hero-card">
      <div class="hero-icon">💪</div>
      <div class="hero-num" id="totalNum">—</div>
      <div class="hero-label">Total Sessions</div>
    </div>
    <div class="hero-card" id="heroPR">
      <div class="hero-icon">🏆</div>
      <div class="hero-num" id="prNum">—</div>
      <div class="hero-label">PRs This Month</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab" data-tab="daily">Daily</button>
    <button class="tab active" data-tab="weekly">Weekly</button>
    <button class="tab" data-tab="monthly">Monthly</button>
    <button class="tab" data-tab="yearly">Yearly</button>
  </div>

  <div id="tabContent"></div>
</main>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">🏋️</span>Today</a>
  <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span>Dashboard</a>
</nav>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SUPABASE_URL = "https://gffjcpmxjlkxwztbtvof.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmZmpjcG14amxreHd6dGJ0dm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNjAyMTAsImV4cCI6MjA5NjgzNjIxMH0.P3YEfOzyz5Ojh5utC71F2CIeaUif6SeAueYRN47Ivq8";
const USER_ID      = "c5cd2b52-0ad3-42b0-a675-c5be808e65bd";

// Fixed day-of-week schedule — same as Python agent
const DAY_SCHEDULE = {0:'Push',1:'Pull',2:'Shoulders',3:'Push',4:'Pull',5:'Legs',6:'Rest'};
// 0=Mon,1=Tue,2=Wed,3=Thu,4=Fri,5=Sat,6=Sun (JS weekday adjusted below)

const SPLIT_STYLE = {
  Push:    {bg:'rgba(255,140,90,0.15)', border:'rgba(255,140,90,0.35)', color:'var(--push)'},
  Pull:    {bg:'rgba(90,169,230,0.15)', border:'rgba(90,169,230,0.35)', color:'var(--pull)'},
  Legs:    {bg:'rgba(110,222,138,0.15)',border:'rgba(110,222,138,0.35)',color:'var(--legs)'},
  Shoulders:{bg:'rgba(199,146,234,0.15)',border:'rgba(199,146,234,0.35)',color:'var(--shoulders)'},
  Rest:    {bg:'rgba(74,85,104,0.12)', border:'rgba(74,85,104,0.25)', color:'var(--rest)'},
};

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── IST DATE HELPERS ──────────────────────────────────────────────
function nowIST(){ const d=new Date(); return new Date(d.getTime()+(5.5*60+d.getTimezoneOffset())*60000); }
function todayIST(){ return nowIST().toISOString().slice(0,10); }

// Get day index 0=Mon..6=Sun from a date string
function dayIndex(dateStr){
  const jsDay = new Date(dateStr+'T12:00:00').getDay(); // noon avoids DST
  return jsDay===0 ? 6 : jsDay-1; // convert Sun=0 to Mon=0 system
}

function scheduledSplit(dateStr){ return DAY_SCHEDULE[dayIndex(dateStr)]; }

function addDays(dateStr,n){
  const d=new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function mondayOfWeek(dateStr){
  const di = dayIndex(dateStr);
  return addDays(dateStr,-di);
}

function fmtShort(dateStr){
  return new Date(dateStr+'T12:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function fmtFull(dateStr){
  return new Date(dateStr+'T12:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
}

// ── GLOBAL STATE ──────────────────────────────────────────────────
let allSessions=[], allActuals=[];
let activeTab='weekly';
let activeWeekStart=mondayOfWeek(todayIST());
let charts={};

async function loadData(){
  const [sRes,aRes] = await Promise.all([
    sb.from('sessions').select('*').eq('user_id',USER_ID).order('date',{ascending:true}),
    sb.from('actual_workouts').select('*').eq('user_id',USER_ID).order('date',{ascending:true})
  ]);
  allSessions = sRes.data||[];
  allActuals  = aRes.data||[];
}

// ── HERO STATS ────────────────────────────────────────────────────
function computeHero(){
  const today = todayIST();

  // Streak: consecutive days with a non-Rest session ending today
  const trainedDates = new Set(
    allSessions.filter(s=>s.split!=='Rest').map(s=>s.date)
  );
  let streak=0, check=today;
  while(true){
    if(scheduledSplit(check)==='Rest'){
      // Rest days don't break streak, skip back
      check=addDays(check,-1); if(streak>30) break; continue;
    }
    if(trainedDates.has(check)){ streak++; check=addDays(check,-1); }
    else break;
  }

  // Total sessions (non-rest, non-duplicate dates)
  const uniqueTrainingDates = new Set(
    allSessions.filter(s=>s.split!=='Rest').map(s=>s.date)
  );
  const totalSessions = uniqueTrainingDates.size;

  // PRs this month — strict: actual weight this month > best previous actual weight
  const monthStart = today.slice(0,7)+'-01';
  // Build best actual per exercise BEFORE this month
  const prevBest={};
  allActuals
    .filter(a=>a.date<monthStart && a.actual_weight_kg)
    .forEach(a=>{
      prevBest[a.exercise_name]=Math.max(prevBest[a.exercise_name]||0, a.actual_weight_kg);
    });
  // Best actual this month per exercise
  const thisBest={};
  allActuals
    .filter(a=>a.date>=monthStart && a.actual_weight_kg)
    .forEach(a=>{
      thisBest[a.exercise_name]=Math.max(thisBest[a.exercise_name]||0, a.actual_weight_kg);
    });
  // Count PRs: exercise has prior history AND this month beats it
  let prCount=0;
  Object.entries(thisBest).forEach(([ex,w])=>{
    if(prevBest[ex]!==undefined && w>prevBest[ex]) prCount++;
  });

  document.getElementById('streakNum').textContent=streak;
  document.getElementById('totalNum').textContent=totalSessions;
  document.getElementById('prNum').textContent=prCount;

  if(streak>0){
    document.getElementById('heroStreak').classList.add('streak-on');
    document.getElementById('streakNum').classList.add('c-push');
  }
  if(prCount>0){
    document.getElementById('heroPR').classList.add('pr-on');
    document.getElementById('prNum').classList.add('c-gold');
  }
}

// ── CHART CLEANUP ─────────────────────────────────────────────────
function destroyCharts(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});
  charts={};
}

// ── TAB RENDER ────────────────────────────────────────────────────
function renderTab(tab){
  destroyCharts();
  const el=document.getElementById('tabContent');
  if(tab==='daily') el.innerHTML=buildDaily();
  else if(tab==='weekly') el.innerHTML=buildWeekly();
  else if(tab==='monthly') el.innerHTML=buildMonthly();
  else if(tab==='yearly') el.innerHTML=buildYearly();

  if(tab==='weekly') initWeeklyCharts();
  if(tab==='monthly') initMonthlyCharts();
  if(tab==='yearly'){ initYearHeatmap(); initYearChart(); }
}

// ─────────────────────────────────────────────────────────────────
// DAILY
// ─────────────────────────────────────────────────────────────────
function buildDaily(){
  const today=todayIST();
  const session=allSessions.find(s=>s.date===today);
  const actuals=allActuals.filter(a=>a.date===today);

  if(!session) return `<div class="empty"><div class="big">No session yet today</div>Agent delivers your plan around 1–4 PM IST.</div>`;

  const split=session.split;
  const st=SPLIT_STYLE[split]||SPLIT_STYLE.Push;
  const exercises=session.full_plan_json?.exercises||[];
  const done=actuals.filter(a=>!a.skipped&&a.actual_sets).length;
  const skipped=actuals.filter(a=>a.skipped).length;
  const pct=exercises.length>0?Math.round(done/exercises.length*100):0;

  const actualVol=actuals.reduce((s,a)=>{
    if(!a.actual_weight_kg||!a.actual_sets||!a.actual_reps) return s;
    const r=parseFloat(String(a.actual_reps).match(/\d+/)?.[0]||0);
    return s+a.actual_sets*r*a.actual_weight_kg;
  },0);

  // Insight
  const prevSame=allSessions.filter(s=>s.split===split&&s.date<today&&s.split!=='Rest').slice(-1)[0];
  let insight=`Today is a <b>${split}</b> day — ${exercises.length} exercises planned. Log your session after the gym.`;
  if(actuals.length>0 && actualVol>0){
    if(prevSame&&prevSame.total_volume_kg>0){
      const diff=actualVol-(prevSame.total_volume_kg);
      const pctDiff=Math.round(Math.abs(diff)/prevSame.total_volume_kg*100);
      insight=diff>=0
        ?`🔥 <b>${pctDiff}% more volume</b> than your last ${split} session! Total: <b>${Math.round(actualVol).toLocaleString()}kg</b>`
        :`📉 Volume down <b>${pctDiff}%</b> vs last ${split} session. Total: <b>${Math.round(actualVol).toLocaleString()}kg</b> — recovery day?`;
    } else {
      insight=`💪 Session in progress — <b>${done}</b> exercise${done!==1?'s':''} logged so far.`;
    }
  }

  return `
    <div class="insight-card"><p>${insight}</p></div>
    <div class="card" style="border-left:4px solid ${st.color}">
      <div class="card-row" style="margin-bottom:10px">
        <span style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:${st.color}">${split}</span>
        <span class="clabel">${fmtFull(today)}</span>
      </div>
      <div class="card-row" style="margin-bottom:6px">
        <span class="clabel">Completed</span>
        <span class="cval" style="color:var(--good)">${done} / ${exercises.length}</span>
      </div>
      ${skipped?`<div class="card-row" style="margin-bottom:6px"><span class="clabel">Skipped</span><span class="cval" style="color:var(--bad)">${skipped}</span></div>`:''}
      <div class="card-row" style="margin-bottom:4px">
        <span class="clabel">Completion</span>
        <span class="cval">${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${pct>=80?'var(--good)':pct>=50?'var(--warn)':'var(--bad)'}"></div></div>
      ${actualVol>0?`<div class="card-row" style="margin-top:10px"><span class="clabel">Volume logged</span><span class="cval">${Math.round(actualVol).toLocaleString()} kg</span></div>`:''}
      ${session.total_volume_kg?`<div class="card-row"><span class="clabel">Planned volume</span><span class="cval" style="color:var(--text-dim)">${Math.round(session.total_volume_kg).toLocaleString()} kg</span></div>`:''}
    </div>
    ${exercises.map(ex=>{
      const act=actuals.find(a=>a.exercise_name===ex.name);
      return `<div class="card" style="padding:12px 14px">
        <div class="card-row">
          <div>
            <div style="font-weight:600;font-size:14px;margin-bottom:2px">${ex.name}</div>
            <div style="font-size:12px;color:var(--text-dim)">${ex.muscle||''}</div>
          </div>
          <div style="text-align:right;font-size:13px">
            ${act&&!act.skipped&&act.actual_sets
              ?`<span style="color:var(--good);font-weight:600">✅ ${act.actual_sets}×${act.actual_reps} @ ${act.actual_weight_kg}kg</span>`
              :act?.skipped
              ?`<span style="color:var(--bad)">Skipped</span>`
              :`<span style="color:var(--text-dim)">${ex.sets}×${ex.reps} @ ${ex.weight_kg}kg</span>`}
          </div>
        </div>
      </div>`;
    }).join('')}`;
}

// ─────────────────────────────────────────────────────────────────
// WEEKLY
// ─────────────────────────────────────────────────────────────────
function buildWeeklyDropdown(){
  const today=todayIST();
  let options='';
  for(let w=0;w<8;w++){
    const wStart=mondayOfWeek(addDays(today,-w*7));
    const wEnd=addDays(wStart,6);
    const label=w===0?'This week ('+fmtShort(wStart)+'–'+fmtShort(wEnd)+')'
                     :fmtShort(wStart)+' – '+fmtShort(wEnd);
    options+=`<option value="${wStart}" ${wStart===activeWeekStart?'selected':''}>${label}</option>`;
  }
  return `<select class="week-select" id="weekSelect" onchange="onWeekChange(this.value)">${options}</select>`;
}

function buildWeekly(){
  const today=todayIST();
  const wStart=activeWeekStart;
  const days=Array.from({length:7},(_,i)=>addDays(wStart,i));
  const DAY_LABELS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Build heatmap using SCHEDULE for colours, sessions for volume
  const heatmap=days.map((d,i)=>{
    const scheduled=scheduledSplit(d);
    const st=SPLIT_STYLE[scheduled]||SPLIT_STYLE.Rest;
    const session=allSessions.find(s=>s.date===d);
    const isFuture=d>today;
    const isToday=d===today;
    const trained=!!session && session.split!=='Rest' && !isFuture;
    const isMissed=!isFuture&&!isToday&&!trained&&scheduled!=='Rest';
    const vol=session?.total_volume_kg||0;

    let cellClass='day-cell';
    let style=`background:${isFuture?'var(--panel-2)':scheduled==='Rest'?'rgba(74,85,104,0.08)':trained?st.bg:isMissed?'rgba(255,107,107,0.06)':'var(--panel-2)'};border-color:${trained?st.border:isMissed?'rgba(255,107,107,0.2)':'transparent'}`;
    if(isToday) cellClass+=' today-cell';

    return `<div class="${cellClass}" style="${style}">
      <div class="day-name ${isToday?'today-name':''}">${DAY_LABELS[i]}</div>
      <div class="dot" style="background:${scheduled==='Rest'?'var(--rest)':isFuture?'var(--panel)':trained?st.color:isMissed?'var(--bad)':'var(--panel)'}"></div>
      <div class="day-split-label" style="color:${st.color};margin-top:4px">${scheduled==='Rest'?'REST':scheduled.slice(0,3).toUpperCase()}</div>
      ${vol>0?`<div class="day-vol">${Math.round(vol/1000*10)/10}t</div>`:''}
    </div>`;
  }).join('');

  // Stats for this week
  const weekSessions=allSessions.filter(s=>s.date>=wStart&&s.date<=addDays(wStart,6)&&s.split!=='Rest'&&s.date<=today);
  const plannedTraining=days.filter(d=>scheduledSplit(d)!=='Rest'&&d<=today).length;
  const completedCount=new Set(weekSessions.map(s=>s.date)).size;
  const pct=plannedTraining>0?Math.round(completedCount/plannedTraining*100):0;
  const totalVol=weekSessions.reduce((a,s)=>a+(s.total_volume_kg||0),0);

  // Volume vs previous week per split
  const prevWStart=addDays(wStart,-7);
  const prevWEnd=addDays(wStart,-1);
  const splits=['Push','Pull','Legs','Shoulders'];

  return `
    ${buildWeeklyDropdown()}
    <div class="week-heatmap">${heatmap}</div>
    <div class="stat-grid" style="margin-bottom:12px">
      <div class="stat-card">
        <div class="val">${completedCount}<span style="font-size:14px;color:var(--text-dim)"> / ${plannedTraining}</span></div>
        <div class="lbl">Sessions done</div>
      </div>
      <div class="stat-card">
        <div class="val">${totalVol>0?(Math.round(totalVol/1000*10)/10)+'<span style="font-size:14px;color:var(--text-dim)">t</span>':'—'}</div>
        <div class="lbl">Volume lifted</div>
      </div>
    </div>
    <div class="card">
      <div class="card-row" style="margin-bottom:6px">
        <span class="clabel">Completion rate</span>
        <span class="cval" style="color:${pct>=80?'var(--good)':pct>=50?'var(--warn)':'var(--bad)'}">${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${pct>=80?'var(--good)':pct>=50?'var(--warn)':'var(--bad)'}"></div></div>
    </div>
    <p class="stitle">Volume per Split — This Week vs Previous</p>
    <div class="card"><div class="chart-wrap"><canvas id="weekChart"></canvas></div></div>`;
}

window.onWeekChange=function(val){
  activeWeekStart=val;
  destroyCharts();
  document.getElementById('tabContent').innerHTML=buildWeekly();
  initWeeklyCharts();
};

function initWeeklyCharts(){
  const wStart=activeWeekStart;
  const prevWStart=addDays(wStart,-7);
  const prevWEnd=addDays(wStart,-1);
  const wEnd=addDays(wStart,6);
  const splits=['Push','Pull','Legs','Shoulders'];
  const colors=['rgba(255,140,90,0.8)','rgba(90,169,230,0.8)','rgba(110,222,138,0.8)','rgba(199,146,234,0.8)'];

  const thisVol=splits.map(sp=>allSessions.filter(s=>s.date>=wStart&&s.date<=wEnd&&s.split===sp).reduce((a,s)=>a+(s.total_volume_kg||0),0));
  const prevVol=splits.map(sp=>allSessions.filter(s=>s.date>=prevWStart&&s.date<=prevWEnd&&s.split===sp).reduce((a,s)=>a+(s.total_volume_kg||0),0));

  const ctx=document.getElementById('weekChart');
  if(!ctx) return;
  charts.week=new Chart(ctx,{
    type:'bar',
    data:{
      labels:splits,
      datasets:[
        {label:'This week',data:thisVol,backgroundColor:colors,borderRadius:6},
        {label:'Previous week',data:prevVol,backgroundColor:colors.map(c=>c.replace('0.8','0.28')),borderRadius:6}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#9AA3B2',font:{size:11}}}},
      scales:{
        x:{ticks:{color:'#9AA3B2'},grid:{color:'rgba(50,56,68,0.4)'}},
        y:{ticks:{color:'#9AA3B2'},grid:{color:'rgba(50,56,68,0.4)'},beginAtZero:true}
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────────
// MONTHLY
// ─────────────────────────────────────────────────────────────────
function buildMonthly(){
  const today=todayIST();
  const monthStart=today.slice(0,7)+'-01';
  const monthlySessions=allSessions.filter(s=>s.date>=monthStart&&s.date<=today&&s.split!=='Rest');
  const totalVol=monthlySessions.reduce((a,s)=>a+(s.total_volume_kg||0),0);
  const best=monthlySessions.reduce((b,s)=>(s.total_volume_kg||0)>(b?.total_volume_kg||0)?s:b,null);

  // Exercise names from session plans (all time)
  const exNames=new Set();
  allSessions.forEach(s=>(s.full_plan_json?.exercises||[]).forEach(e=>exNames.add(e.name)));
  const exOpts=[...exNames].sort().map(n=>`<option value="${n}">${n}</option>`).join('');

  return `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card">
        <div class="val">${new Set(monthlySessions.map(s=>s.date)).size}</div>
        <div class="lbl">Sessions this month</div>
      </div>
      <div class="stat-card">
        <div class="val">${totalVol>0?(Math.round(totalVol/1000*10)/10)+'<span style="font-size:14px;color:var(--text-dim)">t</span>':'—'}</div>
        <div class="lbl">Total volume</div>
      </div>
    </div>
    ${best?`<div class="card" style="border-left:4px solid var(--gold)">
      <div class="clabel" style="margin-bottom:6px">🏆 Best session this month</div>
      <div style="font-weight:600;font-size:15px">${best.split} — ${fmtShort(best.date)}</div>
      <div style="color:var(--text-dim);font-size:13px;margin-top:3px">${Math.round(best.total_volume_kg||0).toLocaleString()} kg</div>
    </div>`:''}
    <p class="stitle">Strength Progression</p>
    <select class="ex-select" id="exSelect" onchange="updateStrengthChart()">
      <option value="">— Select exercise —</option>${exOpts}
    </select>
    <div class="card"><div class="chart-tall"><canvas id="strengthChart"></canvas></div></div>
    <p class="stitle">Weekly Volume Trend</p>
    <div class="card"><div class="chart-wrap"><canvas id="monthChart"></canvas></div></div>`;
}

function initMonthlyCharts(){
  const today=todayIST();
  const monthStart=today.slice(0,7)+'-01';
  let cur=new Date(monthStart+'T12:00:00');
  const wLabels=[],wVols=[];
  let wi=1;
  while(cur.toISOString().slice(0,10)<=today){
    const ws=cur.toISOString().slice(0,10);
    const we=addDays(ws,6);
    const v=allSessions.filter(s=>s.date>=ws&&s.date<=we&&s.split!=='Rest').reduce((a,s)=>a+(s.total_volume_kg||0),0);
    wLabels.push('Wk '+wi++);
    wVols.push(Math.round(v));
    cur.setDate(cur.getDate()+7);
  }
  const ctx=document.getElementById('monthChart');
  if(!ctx) return;
  charts.month=new Chart(ctx,{
    type:'bar',
    data:{labels:wLabels,datasets:[{label:'Volume (kg)',data:wVols,backgroundColor:'rgba(255,140,90,0.75)',borderRadius:8}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#9AA3B2'},grid:{color:'rgba(50,56,68,0.4)'}},y:{ticks:{color:'#9AA3B2'},grid:{color:'rgba(50,56,68,0.4)'},beginAtZero:true}}}
  });
}

window.updateStrengthChart=function(){
  const ex=document.getElementById('exSelect')?.value;
  if(!ex) return;
  if(charts.strength){charts.strength.destroy();delete charts.strength;}

  // Collect all sessions that include this exercise
  const pts=[];
  allSessions.forEach(s=>{
    const planEx=(s.full_plan_json?.exercises||[]).find(e=>e.name===ex);
    if(!planEx) return;
    const actual=allActuals.find(a=>a.date===s.date&&a.exercise_name===ex&&a.actual_weight_kg);
    pts.push({date:s.date,weight:actual?actual.actual_weight_kg:planEx.weight_kg,isActual:!!actual});
  });
  pts.sort((a,b)=>a.date.localeCompare(b.date));
  if(pts.length===0) return;

  // Mark PRs
  let maxW=0;
  const prPts=pts.map(p=>{ const isPR=p.isActual&&p.weight>maxW; if(p.isActual) maxW=Math.max(maxW,p.weight); return isPR?p.weight:null; });

  const ctx=document.getElementById('strengthChart');
  if(!ctx) return;
  charts.strength=new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(p=>fmtShort(p.date)),
      datasets:[
        {label:'Weight (kg)',data:pts.map(p=>p.weight),borderColor:'rgba(255,140,90,0.9)',backgroundColor:'rgba(255,140,90,0.07)',tension:0.35,fill:true,pointRadius:4,pointBackgroundColor:pts.map(p=>p.isActual?'var(--push)':'rgba(255,140,90,0.3)'),pointBorderColor:pts.map(p=>p.isActual?'white':'transparent'),pointBorderWidth:1.5},
        {label:'PR 🏆',data:prPts,borderColor:'transparent',backgroundColor:'transparent',pointRadius:prPts.map(p=>p!==null?8:0),pointBackgroundColor:'var(--gold)',pointBorderColor:'white',pointBorderWidth:2,showLine:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9AA3B2',font:{size:11}}}},scales:{x:{ticks:{color:'#9AA3B2',maxRotation:45},grid:{color:'rgba(50,56,68,0.4)'}},y:{ticks:{color:'#9AA3B2'},grid:{color:'rgba(50,56,68,0.4)'}}}}
  });
};

// ─────────────────────────────────────────────────────────────────
// YEARLY
// ─────────────────────────────────────────────────────────────────
function buildYearly(){
  const today=todayIST();
  const yearStart=today.slice(0,4)+'-01-01';
  const ySessions=allSessions.filter(s=>s.date>=yearStart&&s.date<=today&&s.split!=='Rest');
  const totalVol=ySessions.reduce((a,s)=>a+(s.total_volume_kg||0),0);
  const uniqueDays=new Set(ySessions.map(s=>s.date)).size;

  return `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="val">${uniqueDays}</div><div class="lbl">Training days</div></div>
      <div class="stat-card"><div class="val">${Math.round(totalVol/1000)}<span style="font-size:14px;color:var(--text-dim)">t</span></div><div class="lbl">Total volume</div></div>
    </div>
    <p class="stitle">Training Heatmap — ${today.slice(0,4)}</p>
    <div class="card">
      <div class="year-wrap" id="yearHeatmap"></div>
      <div class="year-legend">
        <span style="font-size:11px;color:var(--text-dim)">Less</span>
        <div class="legend-cell" style="background:var(--panel-2)"></div>
        <div class="legend-cell" style="background:rgba(255,140,90,0.25)"></div>
        <div class="legend-cell" style="background:rgba(255,140,90,0.5)"></div>
        <div class="legend-cell" style="background:rgba(255,140,90,0.75)"></div>
        <div class="legend-cell" style="background:var(--push)"></div>
        <span style="font-size:11px;color:var(--text-dim)">More</span>
      </div>
    </div>
    <p class="stitle">Split Distribution</p>
    <div class="card"><div class="chart-tall"><canvas id="yearChart"></canvas></div></div>`;
}

function initYearHeatmap(){
  const today=todayIST();
  const yearStart=today.slice(0,4)+'-01-01';
  const volByDate={};
  allSessions.filter(s=>s.split!=='Rest').forEach(s=>{ volByDate[s.date]=(volByDate[s.date]||0)+(s.total_volume_kg||0); });
  const maxV=Math.max(...Object.values(volByDate),1);

  const start=new Date(mondayOfWeek(yearStart)+'T12:00:00');
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let grid='<div style="display:flex;gap:3px;align-items:flex-start">';
  // Row labels
  grid+='<div style="display:flex;flex-direction:column;gap:3px;margin-right:3px;padding-top:18px">';
  ['M','','W','','F','','S'].forEach(l=>{ grid+=`<div style="width:11px;height:11px;font-size:8px;color:var(--text-dim);line-height:11px">${l}</div>`; });
  grid+='</div>';

  let monthRow='<div style="display:flex;gap:3px;margin-left:17px;margin-bottom:3px">';
  let prevM=-1;
  for(let w=0;w<53;w++){
    const colStart=new Date(start);
    colStart.setDate(colStart.getDate()+w*7);
    const colM=colStart.getMonth();
    monthRow+=`<div style="width:11px;font-size:8px;color:var(--text-dim);flex-shrink:0">${colM!==prevM?MONTHS[colM]:''}</div>`;
    prevM=colM;

    grid+='<div style="display:flex;flex-direction:column;gap:3px">';
    for(let d=0;d<7;d++){
      const cellD=new Date(colStart);
      cellD.setDate(cellD.getDate()+d);
      const ds=cellD.toISOString().slice(0,10);
      const inRange=ds>=yearStart&&ds<=today;
      const v=volByDate[ds]||0;
      let lvl=0;
      if(inRange&&v>0){ const r=v/maxV; lvl=r<0.25?1:r<0.5?2:r<0.75?3:4; }
      const bg=lvl===0?'var(--panel-2)':lvl===1?'rgba(255,140,90,0.25)':lvl===2?'rgba(255,140,90,0.5)':lvl===3?'rgba(255,140,90,0.75)':'var(--push)';
      const outline=ds===today?'outline:1px solid var(--accent);':'';
      grid+=`<div style="width:11px;height:11px;border-radius:2px;background:${bg};flex-shrink:0;${outline}" title="${inRange&&v>0?ds+': '+Math.round(v)+'kg':''}"></div>`;
    }
    grid+='</div>';
  }
  grid+='</div>';

  document.getElementById('yearHeatmap').innerHTML=monthRow+grid;
}

function initYearChart(){
  const today=todayIST();
  const yearStart=today.slice(0,4)+'-01-01';
  const splits=['Push','Pull','Legs','Shoulders'];
  const counts=splits.map(sp=>new Set(allSessions.filter(s=>s.split===sp&&s.date>=yearStart&&s.date<=today).map(s=>s.date)).size);
  const ctx=document.getElementById('yearChart');
  if(!ctx) return;
  charts.year=new Chart(ctx,{
    type:'doughnut',
    data:{labels:splits,datasets:[{data:counts,backgroundColor:['rgba(255,140,90,0.85)','rgba(90,169,230,0.85)','rgba(110,222,138,0.85)','rgba(199,146,234,0.85)'],borderColor:'#1D2229',borderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#9AA3B2',padding:14,font:{size:12}}}}}
  });
}

// ── TAB SWITCHING ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeTab=btn.dataset.tab;
    renderTab(activeTab);
  });
});

// ── BOOT ──────────────────────────────────────────────────────────
(async()=>{
  await loadData();
  computeHero();
  renderTab(activeTab);
})();
</script>
